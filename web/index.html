<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="theme-color" content="#000000" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/icon-192.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icon-192.svg" />
    <title>tuidaw</title>
  </head>
  <body class="h-dvh w-dvw overflow-hidden bg-black font-mono">
    <div id="app"></div>
    <div id="error-log">
      <div class="title">tuidaw debug log</div>
    </div>
    <script>
      // Global error capture — shows errors on screen when no devtools available
      ;(function () {
        var log = document.getElementById('error-log')
        var style = log.style
        style.display = 'none'
        style.position = 'fixed'
        style.inset = '0'
        style.background = 'rgba(0,0,0,0.95)'
        style.color = '#f05060'
        style.font = '13px/1.5 monospace'
        style.padding = '16px'
        style.overflowY = 'auto'
        style.zIndex = '9999'
        style.whiteSpace = 'pre-wrap'
        style.wordBreak = 'break-all'
        var hasErrors = false
        var hidden = false
        function addEntry(msg, isInfo) {
          if (!isInfo) hasErrors = true
          if (!hidden || !isInfo) style.display = 'block'
          var div = document.createElement('div')
          div.style.cssText =
            'margin-bottom:8px;padding:6px 8px;background:#1a1a1a;border-left:3px solid ' +
            (isInfo ? '#56d4f0' : '#f05060')
          if (isInfo) div.style.color = '#56d4f0'
          div.textContent = new Date().toLocaleTimeString() + ' ' + msg
          log.appendChild(div)
        }
        window._debugLog = function (msg) {
          console.log('[tuidaw]', msg)
          addEntry(msg, true)
        }
        window._debugError = function (msg) {
          console.error('[tuidaw]', msg)
          addEntry(msg, false)
        }
        window._debugHide = function () {
          hidden = true
          if (!hasErrors) style.display = 'none'
        }
        window.addEventListener('error', function (e) {
          var msg =
            'Uncaught: ' +
            e.message +
            '\n  at ' +
            (e.filename || '?') +
            ':' +
            (e.lineno || '?')
          console.error('[tuidaw]', msg)
          addEntry(msg, false)
        })
        window.addEventListener('unhandledrejection', function (e) {
          var msg =
            'Unhandled rejection: ' +
            ((e.reason && e.reason.stack) || e.reason || 'unknown')
          console.error('[tuidaw]', msg)
          addEntry(msg, false)
        })
      })()
    </script>
    <script type="module" src="/src/main.ts"></script>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js').catch(function (e) {
          console.warn('SW registration failed:', e)
        })
      }
    </script>
  </body>
</html>
